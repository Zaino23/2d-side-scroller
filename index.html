<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Scroller Game</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

</head>
<body>
    <canvas id="canvas"></canvas>
    <h1 id="loading">LOADING...</h1>
    <img src="sprite-sheet.png" id="sprite">
    <img src="./Transparent PNG/monster-sheet.png" id="enemy1">
    <img src="./free game asset ghost sprites/ghost-sheet.png" id="enemy2">
    <img src="boom.png" id="boom">
    <img src="./backgrounds/layer-1.png" id="layer1">
    <img src="./backgrounds/layer-2.png" id="layer2">
    <img src="./backgrounds/layer-3.png" id="layer3">
    <img src="./backgrounds/layer-4.png" id="layer4">
    <img src="./backgrounds/layer-5.png" id="layer5">

    <div id="startMenu" class="Ui-Menu">
      <h2 id="gameName">DOG DASH</h2>
      <div class="btn-column">
      <button id="startBtn" class="btn"><span>START</span></button>
      <button id="settingsBtn" class="btn"><span>SETTINGS</span></button>
      <button id="exitBtn" class="btn"><span>EXIT</span></button>
      </div>
    </div>

    <script type="module" src="mains.js"></script>
</body>
</html>
