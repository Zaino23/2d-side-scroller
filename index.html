<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Scroller Game</title>

  <link rel="shortcut icon" href="icon.png" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

</head>
<body>
    <canvas id="canvas"></canvas>
    <h1 id="loading">LOADING...</h1>
    <img src="sprite-sheet.png" id="sprite">
    <img src="./Transparent PNG/monster-sheet.png" id="enemy1">
    <img src="./free game asset ghost sprites/ghost-sheet.png" id="enemy2">
    <img src="boom.png" id="boom">
    <img src="./backgrounds/layer-1.png" id="layer1">
    <img src="./backgrounds/layer-2.png" id="layer2">
    <img src="./backgrounds/layer-3.png" id="layer3">
    <img src="./backgrounds/layer-4.png" id="layer4">
    <img src="./backgrounds/layer-5.png" id="layer5">

    <div id="startMenu" class="Ui-Menu">
      <h2  class="gameTitle">DOG DASH</h2>
      <div class="btn-column">
      <button id="startBtn" class="btn Sbtn"><span>START</span></button>
      <button class="btn settingBtn Sbtn"><span>SETTINGS</span></button>
      <button class="btn exitBtn Sbtn"><span>EXIT</span></button>
      </div>
    </div>
    
    <div id="pauseMenu" class="Ui-Menu hide">
      <h2 class="gameTitle">PAUSED</h2>
      <div class="btn-column">
      <button id="resumeBtn" class="btn Pbtn"><span>RESUME</span></button>
      <button class="btn settingBtn Pbtn"><span>SETTINGS</span></button>
      <button  class="btn exitBtn Pbtn"><span>EXIT</span></button>
      </div>
    </div>

    <div id="selectMenu" class="hide">
      <div id="selection1" class="selector">
        <h2 class="bundle-num">CHALLENGE1:</h2>
        <h2 class="time">Time: 30s</h2>
        <h2 class="goal">Goal: 60 Kills</h2>
        <h2 class="reward">Reward: 50$</h2>
        <button class="select" id="select1">SELECT</button>
      </div>
      <div id="selection2" class="selector">
        <h2 class="bundle-num">CHALLENGE2:</h2>
        <h2 class="time">Time: 40</h2>
        <h2 class="goal">Goal: 125 Kills</h2>
        <h2 class="reward">Reward: 500$</h2>
        <button class="select" id="select2">SELECT</button>
      </div>
      <div id="selection3" class="selector">
        <h2 class="bundle-num">CHALLENGE3:</h2>
        <h2 class="time">Time: 60s</h2>
        <h2 class="goal">Goal: 225 Kills</h2>
        <h2 class="reward">Reward: 2500$</h2>
        <button class="select" id="select3">SELECT</button>
      </div>
    </div>

    <script type="module" src="mains.js"></script>
</body>
</html>
